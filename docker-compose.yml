services:
  db:
    image: postgres:16
    container_name: greencheck-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: greencheck
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/esquema.sql:/docker-entrypoint-initdb.d/01_esquema.sql
      - ./sql/dados.sql:/docker-entrypoint-initdb.d/02_dados.sql

volumes:
  pgdata: